<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Angelleta&family=Great+Vibes&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/bouquet.js"></script>
    <title>For Kal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (() => {
        const petalColors = ['#FFB7C5', '#FFC0CB', '#FFD1DC', '#FFE4E1', '#FFFFFF'];
        
        function createPetal() {
          const petal = document.createElement('div');
          petal.className = 'petal';
          // Use a mix of petals and blossoms
          petal.textContent = Math.random() > 0.5 ? '🌸' : '❀';
          
          const color = petalColors[Math.floor(Math.random() * petalColors.length)];
          petal.style.color = color;
          
          const startX = Math.random() * window.innerWidth;
          const startY = -50; // Start from top for falling petals
          
          petal.style.left = startX + 'px';
          petal.style.top = startY + 'px';
          
          const duration = 6 + Math.random() * 4;
          const tx = (Math.random() - 0.5) * 200;
          const ty = window.innerHeight + 100;
          const rotation = Math.random() * 360;
          const finalRotation = rotation + (Math.random() > 0.5 ? 360 : -360);
          
          petal.style.setProperty('--duration', duration + 's');
          petal.style.setProperty('--tx', tx + 'px');
          petal.style.setProperty('--ty', ty + 'px');
          petal.style.setProperty('--rot', rotation + 'deg');
          petal.style.setProperty('--frot', finalRotation + 'deg');
          
          document.body.appendChild(petal);
          
          setTimeout(() => {
            petal.remove();
          }, duration * 1000);
        }
        
        setInterval(createPetal, 400 + Math.random() * 600);
      })();
    </script>
  </body>
</html>
